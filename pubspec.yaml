name: pathguide_app
description: "PathGuide - Your Career Compass. Bridging the gap between academia and industry."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  go_router: ^14.3.0
  dio: ^5.5.0
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  equatable: ^2.0.5
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  flutter_animate: ^4.5.0
  flutter_secure_storage: ^9.2.4
  dotted_border: ^2.1.0
  cached_network_image: ^3.3.1
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
